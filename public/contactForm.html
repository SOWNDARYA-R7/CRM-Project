<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
 body{
        font-family: Arial,sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: rgb(243, 246, 248);
    }
    .container{
        text-align: center;
        background-color: white;
        padding: 30px;
        box-shadow: 0px 5px 10px grey;
        border-radius: 15px;
    }
    button{
        background-color: rgb(26, 145, 26);
        height:30px;
        border-radius: 7px;
        border: none;
        color: white;
        padding :10px 20px;
        
    }

   button:hover{
    background-color: rgb(48, 238, 48);
    border-radius: 50px;
   }
   #result{
    margin-top: 20px;
    font-size: 18px;
   }
   span[id$="Error"]{
       color: red;
       font-size: 12px;
       text-align: left;
   }
   </style>
<body>
    <div class="container">
     <h1>Contact Form</h1>
    <p>Fill out the form to add a new contact.</p>
    <table>
        <tr>
            <td>Customer ID:</td>
            <td>
                <input type="number" id="customerId" required>
                <span id="customerIdError"></span>
            
            </td>
        </tr>
        <tr>
            <td>Contact ID:</td>
            <td>
                <input type="number" id="contactId" required>
                <span id="contactIdError"></span>
            </td>
        </tr>
        <tr>
            <td>Name:</td>
            <td>
               <input type="text" id="name" required>
               <span id="nameError"></span>
            </td>
        </tr>
        <tr>
            <td>Email:</td>
            <td>
                <input type="email" id="email" required>
                <span id="emailError"></span>
            </td>
        </tr>
        
    </table><br>
    <button onclick="addContacts()">Add Contact</button><br><br>
    <button onclick="window.location.href='./home.html'">Back</button>
    <p id = "result"></p>
    </div>
    <script>
        
        document.getElementById("name").addEventListener("input",function(){
            const name = this.value;
            const regex = /^[A-Za-z ]+$/;
            if(name === ""){
                document.getElementById("nameError").innerText = "Name is required";
            }
            else if(!regex.test(name)){
                document.getElementById("nameError").innerText = "Only letters allowed";
            }
            else{
                document.getElementById("nameError").innerText = "";
            }
        });

        document.getElementById("email").addEventListener("input",function(){
            const email = this.value;
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(email === ""){
                document.getElementById("emailError").innerText = "Email is required";
            }
            else if(!regex.test(email)){
                document.getElementById("emailError").innerText = "Enter valid Email";
            }
            else{
                document.getElementById("emailError").innerText = "";

            }
        });
          
        document.getElementById("contactId").addEventListener("input",function(){
            
            if(this.value !== "" && isNaN(this.value)){
                document.getElementById("contactIdError").innerText = "Only numbers allowed";
            }
            else{
                document.getElementById("contactIdError").innerText = "";

            }
        });

        document.getElementById("customerId").addEventListener("input",function(){
            
            if(this.value !== "" && isNaN(this.value)){
                document.getElementById("customerIdError").innerText = "Only numbers allowed";
            }
            else{
                document.getElementById("customerIdError").innerText = "";

            }
        });


        function ValidateForm(){
            const customerId = document.getElementById("customerId").value;
            const contactId = document.getElementById("contactId").value;
            const name = document.getElementById("name").value; 
            const email = document.getElementById("email").value;
            const customerIdError = document.getElementById("customerIdError");
            const contactIdError = document.getElementById("contactIdError");
            const nameError = document.getElementById("nameError"); 
            const emailError = document.getElementById("emailError");
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const nameRegex = /^[A-Za-z ]+$/;
            if(customerId ===""&&
            contactId === "" &&
            name === ""&&
            email ===""
            ){
              nameError.innerText="enter valid name";
              emailError.innerText="enter valid email";
              contactIdError.innerText="enter valid contactId";
              customerIdError.innerText="enter valid customerId";
            return false;
            }
            if(!nameRegex.test(name)){
                alert("Invalid name");
                return false;
            }
            if(!emailRegex.test(email)){
                alert("Invalid email");
                return false;
            }
            return true;

        }

        async function addContacts(){
            if(!ValidateForm()){
                return;
            }

            const customerId = Number(document.getElementById("customerId").value);
            const contactId = Number(document.getElementById("contactId").value);
            const name = document.getElementById("name").value; 
            const email = document.getElementById("email").value;
           
            const response = await fetch("http://localhost:5000/addContact",{
                method: "POST",
                headers:{
                    "Content-Type" : "application/json"
                },
                body:JSON.stringify({customerId,contactId, name, email})
            })
            const data = await response.json();
             document.getElementById("result").innerHTML = data.message;
             const result = document.getElementById("result");
             result.style.color = data.message === "Contact added successfully" ? "green" : "red";
        }
        </script>
</body>
</html>
