<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
 body{
        font-family: Arial,sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: rgb(243, 246, 248);
    }
    .container{
        text-align: center;
        background-color: white;
        padding: 30px;
        box-shadow: 0px 5px 10px grey;
        border-radius: 15px;
    }
    button{
        background-color: rgb(26, 145, 26);
        height:30px;
        border-radius: 7px;
        border: none;
        color: white;
        padding :10px 20px;
        
    }

   button:hover{
    background-color: rgb(48, 238, 48);
    border-radius: 50px;
   }
   #result{
    margin-top: 20px;
    font-size: 18px;
   }
   span[id$="Error"]{
       color: red;
       font-size: 12px;
       text-align: left;
   }
   </style>
<body>
    <div class="container">
     <h1>Contact Form</h1>
    <p>Fill out the form to add a new contact.</p>
    <table>
        <tr>
            <td>Customer ID:</td>
            <td>
                <input type="number" id="customerId" required>
                <span id="customerIdError"></span>
            
            </td>
        </tr>
        <tr>
            <td>Contact ID:</td>
            <td>
                <input type="number" id="contactId" required>
                <span id="contactIdError"></span>
            </td>
        </tr>
        <tr>
            <td>Name:</td>
            <td>
               <input type="text" id="name" required>
               <span id="nameError"></span>
            </td>
        </tr>
        <tr>
            <td>Email:</td>
            <td>
                <input type="email" id="email" required>
                <span id="emailError"></span>
            </td>
        </tr>
        
    </table><br>
    <button onclick="addContacts()">Add Contact</button><br><br>
    <button onclick="window.location.href='./home.html'">Back</button>
    <p id = "result"></p>
    </div>
    <script>
        
        const validationRules = {
            customerId:{
               regex:/^\d+$/,
               requiredMessage:"Customer id is required",
               errorMessage: "Only digits Allowed"
            },
            contactId:{
               regex:/^\d+$/,
               requiredMessage:"Customer id is required",
               errorMessage: "Only digits Allowed"
            },
            name:{
                regex:/^[A-Za-z ]+$/,
                requiredMessage:"Name field Required",
                errorMessage:"Only alphabets Allowed"
            },
            email:{
                regex:/^[^\s@]+@[^\s@]+\.[^\s@]+$/,
                requiredMessage:"EMail is required",
                errorMessage:"Enter valid Email"
            }
        };

        function validateField(value,rule,errorElement){
          if(value.trim() === ""){
            errorElement.innerText = rule.requiredMessage;
            return false;
          }
          if(!rule.regex.test(value)){
            errorElement.innerText = rule.errorMessage;
            return false;
          }
          else{
            errorElement.innerText = "";
            return true;
          }
        }

        for(const field in validationRules){
            document.getElementById(field).addEventListener("input",function(){
                validateField(
                    this.value,
                    validationRules[field],
                    document.getElementById(field + "Error")
                )
            })
        }

        function validateForm(){
            let isValid = true;
            for(const field in validationRules){
                const value = document.getElementById(field).value;
                const valid = validateField(
                    value,
                    validationRules[field],
                    document.getElementById(field + "Error")
                );
                if(!valid){
                    isValid = false;
                }
            }
            return isValid;
        }
        
        async function addContacts(){
            console.log("button clicked");
            if(!validateForm()){
                return;
            }
            console.log("form validated");

            const customerId = Number(document.getElementById("customerId").value);
            const contactId = Number(document.getElementById("contactId").value);
            const name = document.getElementById("name").value; 
            const email = document.getElementById("email").value;
           
            const response = await fetch("http://localhost:5000/addContact",{
                method: "POST",
                headers:{
                    "Content-Type" : "application/json"
                },
                body:JSON.stringify({customerId,contactId, name, email})
            })
            const data = await response.json();
             document.getElementById("result").innerHTML = data.message;
             const result = document.getElementById("result");
             result.style.color = data.message === "Contact added successfully" ? "green" : "red";
        }
        </script>
</body>
</html>
