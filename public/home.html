<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
    display:flex;
    justify-content: center;
    align-items: center;
    height:100vh;
    margin: 0;
    }
    .container{
        text-align: center;
        background-color: beige;
        padding: 10px;
        border-radius: 20px;
        box-shadow: 0px 2px 5px grey;
    }
     button{
        background-color: rgb(26, 145, 26);
        height:30px;
        border-radius: 7px;
        border: none;
        color: white;
        padding :10px 20px;
    }
    #logout{
    margin-top: 20px;
}

</style>
<body>
    <div class="container">
    <h1 style="color: rgb(246, 75, 75);">Admin Panel</h1>
    <p style="color: rgba(251, 6, 157, 0.895);">Welcome to your admin panel! Here you can manage your users and organize your leads and contacts.</p>
    
    <button onclick="getLeads()">Leads</button>
    <button onclick="deleteLead()">Delete Lead</button>
    <button onclick="window.location.href='./Leadform.html'">+</button>

    <p id="result"></p>
    <br><br>
    <button onclick="getContact()">Contacts</button>
     <button onclick="window.location.href='./contactForm.html'">+</button>
    <p id="conresult"></p>
    <button id="logout" onclick="window.location.href='login.html'">Logout</button>
</div>

    <script>
        async function getLeads() {
            console.log("Button Clicked");
            const response = await fetch('http://localhost:5000/leads');
            const data = await response.json();
            console.log(data);
            let output ="";
            data.leads.forEach(lead =>{
                output += `Name: ${lead.name}<br>
                Email: ${lead.email}
                <br><br>`;
            });
          document.getElementById("result").innerHTML = output;
        }
        

        async function deleteLead(){
            console.log("Button Clicked");
            const customerId = prompt("Enter the customerId to delete");
            const response = await fetch(`http://localhost:5000/deleteLead/${customerId}`,
            {
                method: "DELETE"
            }
            );
            const data = await response.json();
            console.log(data);
            alert(data.message);

        }

        async function getContact(){
            const response = await fetch("http://localhost:5000/getContacts");
                const data = await response.json();
                let output = "";
                data.contacts.forEach(contact => {
                    output += `Name ${contact.name}<br>
                    Email: ${contact.email}<br><br>`;
                })
                document.getElementById("conresult").innerHTML = output;
        }
    </script>

</body>
</html>
