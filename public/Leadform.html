<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family: Arial,sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: rgb(243, 246, 248);
    }
    .container{
        text-align: center;
        background-color: white;
        padding: 30px;
        box-shadow: 0px 5px 10px grey;
        border-radius: 15px;
    }
    button{
        background-color: rgb(26, 145, 26);
        height:30px;
        border-radius: 7px;
        border: none;
        color: white;
        padding :10px 20px;
        
    }

   button:hover{
    background-color: rgb(48, 238, 48);
    border-radius: 50px;
   }
   #result{
    margin-top: 20px;
    font-size: 18px;
   }

</style>
<body>
    <div class="container">
    <h1>Lead Form</h1>
    <p>Fill out the form to add a new lead.</p>
    <table>
        <tr>
            <td>Customer ID:</td>
            <td><input type="text" id="customerId" required></td>
        </tr>
        <tr>
            <td>Name:</td>
            <td><input type="text" id="name" required></td>
        </tr>
        <tr>
            <td>Email:</td>
            <td><input type="email" id="email" required></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td><input type="password" id="password" required></td>
        </tr>
    </table>
    <br>
    <button onclick="addLeads()">Add Lead</button><br><br>
    <button onclick="window.location.href='./home.html'">Back</button>
    <p id = "result"></p>
    </div>
    <script>
        async function addLeads(){
            console.log("Button Clicked");

            const customerId = Number(document.getElementById("customerId").value);
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const response = await fetch("http://localhost:5000/addleads",{
                method: "POST",
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({ customerId, name, email, password })
            })
                const data = await response.json();
                console.log(data);
                document.getElementById("result").innerHTML = data.message;
                result.style.color = data.message === "Lead Created Successfully" ? "green":"red";
        }
    </script>
</body>
</html>
