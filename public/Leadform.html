<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family: Arial,sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: rgb(243, 246, 248);
    }
    .container{
        text-align: center;
        background-color: white;
        padding: 30px;
        box-shadow: 0px 5px 10px grey;
        border-radius: 15px;
    }
    button{
        background-color: rgb(26, 145, 26);
        height:30px;
        border-radius: 7px;
        border: none;
        color: white;
        padding :10px 20px;
        
    }

   button:hover{
    background-color: rgb(48, 238, 48);
    border-radius: 50px;
   }
   #result{
    margin-top: 20px;
    font-size: 18px;
   }
   span[id$="Error"]{
       color: red;
       font-size: 12px;
       text-align: left;
   }
   
</style>
<body>
    <div class="container">
    <h1>Lead Form</h1>
    <p>Fill out the form to add a new lead.</p>
    <table>
        <tr>
            <td>Customer ID:</td>
            <td><input type="number" id="customerId">
            <span id ="customerIdError"></span></td>
        </tr>
        <tr>
            <td>Name:</td>
            <td><input type="text" id="name" required><span id ="nameError"></span></td>
        </tr>
        <tr>
            <td>Email:</td>
            <td><input type="email" id="email" required>
            <span id ="emailError"></span></td>
        </tr>
        <tr>
            <td>Password:</td>
            <td><input type="password" id="password" required>
            <span id ="passwordError"></span></td>
        </tr>
    </table>
    <br>
    <button onclick="addLeads()">Add Lead</button><br><br>
    <button onclick="window.location.href='./home.html'">Back</button>
    <p id = "result"></p>
    </div>
    <script>

        document.getElementById("name").addEventListener("input",function(){
            const name = this.value;
            const regex = /^[A-Za-z ]+$/
            const nameError = document.getElementById("nameError");

            if(name === ""){
                 nameError.innerText = "Name is Required";
            }
            else if(!regex.test(name)){
                 nameError.innerText = "only Letters allowed";
            }
            else{
                 nameError.innerText = "";
            }
        });

        document.getElementById("email").addEventListener("input",function(){
            const email = this.value;
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
            const emailError = document.getElementById("emailError");

            if(email === ""){
                 emailError.innerText = "email is Required";
            }
            else if(!regex.test(email)){
                 emailError.innerText = "Enter valid Email";
            }
            else{
                 emailError.innerText = "";
            }
        });
        
        document.getElementById("customerId").addEventListener("input",function(){
            const customerId = this.value;
            const customerIdError = document.getElementById("customerIdError");
            if(this.value !== "" && isNaN(this.value)){
                customerIdError.innerText = "Enter Only digits"
            }
            else{
                customerIdError.innerText = ""
            }
        });

        document.getElementById("password").addEventListener("input",function(){
            const password = this.value;
            const passwordError = document.getElementById("passwordError");
             const regex = /^[A-Z](?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{7}$/;
            if(password === ""){
                passwordError.innerText = "Enter valid password";
            }
            else if(!regex.test(password)){
              passwordError.innerText = "password upto 8 char ,First captital letter, one digit,one special character";
            }
            else{
                passwordError.innerText = ""
            }
        });

        function Validate(){
            const customerId = document.getElementById("customerId").value;
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const customerIdError = document.getElementById("customerIdError");
            const passwordError = document.getElementById("passwordError");
            const nameError = document.getElementById("nameError"); 
            const emailError = document.getElementById("emailError");
            const nameRegex = /^[A-Za-z ]+$/
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
            const passwordRegex = /^[A-Z](?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{7}$/;
            if(customerId ===""&&
            password === "" &&
            name === ""&&
            email ===""
            ){
              nameError.innerText="enter valid name";
              emailError.innerText="enter valid email";
              passwordError.innerText="enter valid contactId";
              customerIdError.innerText="enter valid customerId";
            return false;
            }
            
            if(!nameRegex.test(name)){
                nameError.innerText="enter valid name";
                return false;
            }
             if(!emailRegex.test(email)){
                emailError.innerText="enter valid email";
                return false;
            }
            if(!passwordRegex.test(password)){
                passwordError.innerText="enter valid password";
                return false;
            }
            return true;

        }
        async function addLeads(){
            console.log("Button Clicked");

            if(!Validate()){
                return;
            }
            const customerId = Number(document.getElementById("customerId").value);
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const response = await fetch("http://localhost:5000/addleads",{
                method: "POST",
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({ customerId, name, email, password })
            })
                const data = await response.json();
                console.log(data);
                document.getElementById("result").innerHTML = data.message;
                document.getElementById("result").style.color = data.message === "Lead added successfully" ? "green":"red";
        }
    </script>
</body>
</html>
